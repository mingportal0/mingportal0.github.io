---
layout: page
title: Tags
---

<div style="border: 1px;">
  {% for tag in site.tags %}
    {% assign tag_size = site.posts | where_exp: 'post', 'post.tags contains tag.name' | size %}
    <a href="/tags/{{ tag.slug }}" class="tag tag-{{ tag.name }}">
      <span style="font-size: {{ tag_size | times: 100 | divided_by: site.tags.size | plus: 100  }}% !important; line-height: initial;">
        #{{ tag.name }} ({{ tag_size }})
      </span>
    </a>
  {% endfor %}
</div>
